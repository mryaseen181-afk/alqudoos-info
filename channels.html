<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qudoos Fruits | Premium Fruit Distribution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Modern Minimalist Design Tokens */
        :root {
            --primary: #d63031;       /* Crisp Apple Red */
            --primary-hover: #b32424;
            --primary-glow: rgba(214, 48, 49, 0.08);
            --logo-red: #d63031;      /* Logo Red */
            --dark: #2d1a18;          /* Apple Seed/Stem Charcoal */
            --text-main: #3e2723;     /* Deep Warm Apple Bark */
            --text-muted: #8d6e63;    /* Warm Muted Brown */
            --bg-surface: #ffffff;
            --bg-global: #fbf9f1;     /* Creamy Apple Flesh */
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
            --shadow-sm: 0 2px 8px rgba(45, 26, 24, 0.04);
            --shadow-md: 0 10px 30px rgba(45, 26, 24, 0.06);
            --shadow-lg: 0 20px 50px rgba(45, 26, 24, 0.1);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            color: var(--text-main);
            background-color: var(--bg-global);
            line-height: 1.7;
            letter-spacing: -0.2px;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        /* Floating Premium Header */
        header {
            background: rgba(251, 249, 241, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(45, 26, 24, 0.06);
            transition: var(--transition);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .logo-image-wrapper {
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .logo-image-wrapper img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .brand-logo:hover .logo-image-wrapper {
            transform: scale(1.05);
        }

        .brand-text h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--dark);
            letter-spacing: -0.5px;
        }

        .brand-text span {
            color: var(--primary);
            font-weight: 700;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 32px;
            align-items: center;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 15px;
            transition: var(--transition);
            position: relative;
            padding: 8px 0;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2.5px;
            background-color: var(--primary);
            transition: var(--transition);
            border-radius: 2px;
        }

        nav ul li a:hover {
            color: var(--primary);
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        nav ul li a.active {
            color: var(--primary);
        }

        nav ul li a.active::after {
            width: 100%;
        }

        /* Hero Section */
        #hero {
            padding: 180px 0 140px 0;
            background: linear-gradient(rgba(45, 26, 24, 0.75), rgba(45, 26, 24, 0.85)), url('apples_on_branch.jpg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            position: relative;
            text-align: center;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            background: rgba(214, 48, 49, 0.25);
            color: #ff7675;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            border: 1px solid rgba(214, 48, 49, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #hero h2 {
            font-size: 58px;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -1.5px;
            margin-bottom: 24px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        #hero h2 span {
            color: #ff7675;
        }

        #hero p {
            font-size: 19px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 38px;
            max-width: 660px;
            margin-left: auto;
            margin-right: auto;
            text-shadow: 0 1px 5px rgba(0,0,0,0.2);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            background: var(--primary);
            color: #fff;
            padding: 16px 36px;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 15px;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(214, 48, 49, 0.35);
        }

        .btn:hover {
            background: #ffffff;
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(255, 255, 255, 0.25);
        }

        /* Section Layouts */
        section {
            padding: 100px 0;
        }

        .section-header {
            max-width: 600px;
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--dark);
            line-height: 1.25;
        }

        .section-title span {
            color: var(--primary);
        }

        .section-subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        /* Features Grid */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .feature-card {
            background: var(--bg-surface);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(45, 26, 24, 0.05);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #ff7675);
            opacity: 0;
            transition: var(--transition);
        }

        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(214, 48, 49, 0.15);
        }

        .feature-card:hover::before {
            opacity: 1;
        }

        .feature-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--dark);
            letter-spacing: -0.3px;
        }

        .feature-card p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.65;
        }

        /* Table Layout */
        .table-container {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(45, 26, 24, 0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 600px;
        }

        th {
            font-weight: 700;
            color: var(--text-muted);
            padding: 20px 28px;
            border-bottom: 2px solid #f3ece4;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #fdfbf7;
            border-radius: var(--radius-sm);
        }

        td {
            padding: 24px 28px;
            border-bottom: 1px solid #f3ece4;
            font-size: 15px;
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #fcfbf7;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(214, 48, 49, 0.07);
            color: var(--primary);
            border: 1px solid rgba(214, 48, 49, 0.15);
        }

        .badge.summer {
            background: rgba(124, 179, 66, 0.07);
            color: #558b2f;
            border: 1px solid rgba(124, 179, 66, 0.15);
        }

        /* Fruits Showcase Grid styles */
        .fruits-showcase {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 50px;
        }
        @media (max-width: 992px) {
            .fruits-showcase {
                grid-template-columns: 1fr;
            }
        }
        .fruit-category-card {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(45, 26, 24, 0.05);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .fruit-category-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }
        .category-image {
            height: 260px;
            width: 100%;
            overflow: hidden;
        }
        .category-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        .fruit-category-card:hover .category-image img {
            transform: scale(1.05);
        }
        .category-details {
            padding: 36px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .category-details h3 {
            font-size: 24px;
            font-weight: 800;
            color: var(--dark);
            margin: 16px 0 10px 0;
            letter-spacing: -0.5px;
        }
        .category-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .fruit-types {
            margin-top: auto;
            border-top: 1px solid rgba(45, 26, 24, 0.08);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .type-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            gap: 16px;
        }
        .type-item strong {
            color: var(--dark);
            font-weight: 700;
        }
        .type-item span {
            color: var(--text-muted);
            text-align: right;
        }

        /* Contact Page specific styles */
        .contact-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: start;
        }

        @media (max-width: 992px) {
            .contact-split { grid-template-columns: 1fr; gap: 48px; }
            #hero h2 { font-size: 40px; }
            section { padding: 80px 0; }
        }

        .contact-info h3 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
            line-height: 1.3;
            color: var(--dark);
        }

        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .contact-card {
            background: var(--bg-surface);
            padding: 26px 32px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(45, 26, 24, 0.05);
            transition: var(--transition);
        }

        .contact-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-3px);
        }

        .contact-card p {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .contact-card a {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark);
            text-decoration: none;
            transition: var(--transition);
            letter-spacing: -0.3px;
        }

        .contact-card a:hover {
            color: var(--primary);
        }

        .meta-info {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid rgba(45, 26, 24, 0.08);
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Form Styling */
        form {
            background: var(--bg-surface);
            padding: 44px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(45, 26, 24, 0.04);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: var(--radius-sm);
            font-size: 15px;
            background: #fff;
            color: var(--dark);
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(214, 48, 49, 0.15);
        }

        form button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            width: 100%;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(214, 48, 49, 0.2);
        }

        form button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(214, 48, 49, 0.35);
        }

        /* Partner Map Styles */
        .partner-map-container {
            margin-top: 20px;
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 40px 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(45, 26, 24, 0.05);
        }
        
        .partner-map-container h3 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            color: var(--dark);
            text-align: center;
        }
        
        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            background: transparent;
            overflow: visible;
            aspect-ratio: 1/1;
        }

        .map-graphic {
            width: 100%;
            height: 100%;
            background: url('india_map_outline.png') no-repeat center center;
            background-size: contain;
            position: relative;
            opacity: 1.0;
            transition: var(--transition);
        }
        
        
        
        .map-pin {
            position: absolute;
            width: 32px;
            height: 32px;
            cursor: pointer;
            transition: var(--transition);
            transform: translate(-50%, -50%);
        }

        .map-pin svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 2px 4px rgba(45, 26, 24, 0.25));
            transition: var(--transition);
            animation: apple-bounce 2s infinite ease-in-out;
        }

        .map-pin:hover svg {
            transform: scale(1.25);
            filter: drop-shadow(0 6px 12px rgba(214, 48, 49, 0.45));
        }

        @keyframes apple-bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        
        /* Map locations placement on India outline image */
        .pin-punjab { top: 22%; left: 32%; }
        .pin-ambala { top: 25%; left: 36%; }
        .pin-saharanpur { top: 26%; left: 39%; }
        .pin-delhi { top: 31%; left: 38%; }
        .pin-kanpur { top: 39%; left: 49%; }
        .pin-pune { top: 66%; left: 27%; }

        

        .map-pin:hover 

        .map-legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 30px;
            border-top: 1px solid rgba(45, 26, 24, 0.08);
            padding-top: 24px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .legend-item span {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* Footer */
        footer {
            background: var(--dark);
            color: rgba(255, 255, 255, 0.6);
            padding: 48px 0;
            font-size: 14px;
        }

        footer .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer p strong {
            color: #fff;
        }

        /* Mobile First Responsive Styles */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 14px;
                padding: 14px 0;
                align-items: center;
            }
            nav {
                width: 100%;
            }
            nav ul {
                display: flex;
                justify-content: center;
                gap: 12px;
                overflow-x: auto;
                width: 100%;
                padding-bottom: 6px;
                -webkit-overflow-scrolling: touch;
            }
            nav ul li a {
                font-size: 13px;
                white-space: nowrap;
                padding: 4px 6px;
            }
            #hero {
                padding: 120px 0 80px 0;
            }
            #hero h2 {
                font-size: 36px;
            }
            #hero p {
                font-size: 16px;
                margin-bottom: 28px;
            }
            section {
                padding: 60px 0;
            }
            .section-title {
                font-size: 28px;
            }
            .features-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .feature-card {
                padding: 30px 20px;
            }
            .fruits-showcase {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .category-details {
                padding: 24px;
            }
            .partner-map-container {
                padding: 20px 10px;
            }
            .map-wrapper {
                max-width: 100%;
            }
            form {
                padding: 24px 16px;
            }
            footer .container {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
        @media (max-width: 576px) {
            footer .container { flex-direction: column; gap: 16px; text-align: center; }
        }

        .map-pin.highlighted svg {
            transform: scale(1.35);
            filter: drop-shadow(0 8px 16px rgba(214, 48, 49, 0.6));
        }
        .map-pin.highlighted .tooltip {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(-5px);
        }
        .legend-item {
            cursor: pointer;
            transition: var(--transition);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
        }
        .legend-item:hover, .legend-item.active {
            background: var(--primary-glow);
            color: var(--primary);
        }
        .legend-item span {
            transition: var(--transition);
        }
        .legend-item:hover span, .legend-item.active span {
            transform: scale(1.3);
            background: var(--primary);
        }
    

        .map-pin {
            position: absolute;
            width: 24px;
            height: 24px;
            cursor: pointer;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            position: absolute;
            width: 28px;
            height: 28px;
            border: 2.5px solid var(--primary);
            border-radius: 50%;
            opacity: 0;
            animation: pulse-expand 2s infinite cubic-bezier(0.25, 0, 0, 1);
            pointer-events: none;
        }

        .pulse-ring::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2.5px solid var(--primary);
            border-radius: 50%;
            top: -2.5px;
            left: -2.5px;
            animation: pulse-expand 2s infinite cubic-bezier(0.25, 0, 0, 1);
            animation-delay: 1s;
        }

        @keyframes pulse-expand {
            0% {
                transform: scale(0.7);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.9);
                opacity: 0;
            }
        }

        .map-pin:hover .pulse-ring,
        .map-pin:hover .pulse-ring::after {
            border-color: #558b2f;
            animation-duration: 1.2s;
        }
        
        .pin-punjab { top: 25.5%; left: 30.5%; }
        .pin-ambala { top: 28.5%; left: 34%; }
        .pin-saharanpur { top: 28.5%; left: 38.5%; }
        .pin-delhi { top: 33.5%; left: 35%; }
        .pin-kanpur { top: 39.5%; left: 43.5%; }
        .pin-pune { top: 65.5%; left: 25.5%; }
    
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="index.html" class="brand-logo">
                <div class="logo-image-wrapper">
                    <img src="logo.png" alt="Al-Qudoos Fruits Logo">
                </div>
                <div class="brand-text">
                    <h1>Al-Qudoos <span>Fruits</span></h1>
                </div>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html" class="">Home</a></li>
                    <li><a href="about.html" class="">About Us</a></li>
                    <li><a href="overview.html" class="">Overview</a></li>
                    <li><a href="varieties.html" class="">Varieties</a></li>
                    <li><a href="channels.html" class="active">Channels</a></li>
                    <li><a href="contact.html" class="">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="partner-map-sec" style="padding-top: 80px;">
        <div class="container">
            <!-- Interactive Partner Map Section -->
            <div class="partner-map-container">
                <h3>Partner Network</h3>
                
                <div class="map-wrapper">
                    <div class="map-graphic"></div>

                    <!-- Clean static map with pre-rendered apple indicators -->
